<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyFeed">
<meta name="description" content="あなただけのAIニュースフィード">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MyFeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #18181f;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0f0f5;
  --text2: #9090a0;
  --text3: #5a5a70;
  --accent: #00e5a0;
  --accent2: #00b57e;
  --blue: #4a9eff;
  --amber: #ffa940;
  --purple: #a78bfa;
  --pink: #f472b6;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

/* Layout */
#root{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
#header{
  padding: calc(var(--safe-top) + 16px) 20px 0;
  background: var(--bg);
  flex-shrink:0;
  z-index:10;
}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 80px)}
#scroll-area::-webkit-scrollbar{display:none}
#nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  padding: 12px 24px calc(var(--safe-bottom) + 12px);
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  display:flex;justify-content:space-around;align-items:center;
  z-index:20;
}

/* Header */
.h-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-0.5px}
.brand em{color:var(--accent);font-style:normal}
.h-actions{display:flex;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:12px;
  border:0.5px solid var(--border2);background:var(--bg3);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.icon-btn:active{transform:scale(0.92);background:var(--bg2)}
.icon-btn.spinning svg{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Search */
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap input{
  width:100%;padding:11px 16px 11px 40px;
  border:0.5px solid var(--border);border-radius:14px;
  background:var(--bg3);color:var(--text);font-size:15px;
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color 0.2s;
}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--border2)}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3)}

/* Categories */
.cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
.cats::-webkit-scrollbar{display:none}
.cat{
  flex-shrink:0;padding:6px 16px;border-radius:20px;
  border:0.5px solid var(--border);background:transparent;
  color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;
  cursor:pointer;transition:all 0.15s;white-space:nowrap;
}
.cat:active{transform:scale(0.95)}
.cat.active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:500}

/* Feed */
.feed{padding:16px 16px 0}
.section-label{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;padding:0 4px;
}

/* Card */
.card{
  background:var(--bg2);border:0.5px solid var(--border);
  border-radius:20px;padding:16px;margin-bottom:12px;
  transition:border-color 0.2s;position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(to right,transparent,var(--border2),transparent);
}
.card:active{border-color:var(--border2)}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:8px;font-size:11px;font-weight:500;
  font-family:'Syne',sans-serif;letter-spacing:0.3px;
}
.badge-ai{background:rgba(0,229,160,0.12);color:var(--accent)}
.badge-biz{background:rgba(74,158,255,0.12);color:var(--blue)}
.badge-market{background:rgba(255,169,64,0.12);color:var(--amber)}
.badge-tech{background:rgba(167,139,250,0.12);color:var(--purple)}
.card-time{font-size:11px;color:var(--text3)}
.card-source{font-size:12px;color:var(--text3);margin-bottom:8px;font-style:italic}
.card-title{
  font-size:16px;font-weight:500;line-height:1.45;
  color:var(--text);margin-bottom:10px;
}
.summary{
  font-size:13px;color:var(--text2);line-height:1.65;
  margin-bottom:12px;border-left:2px solid var(--accent2);
  padding-left:12px;
}
.summary-loading{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text3);margin-bottom:12px;
}
.dots{display:flex;gap:4px}
.dots span{
  width:5px;height:5px;border-radius:50%;background:var(--accent2);
  animation:blink 1.2s ease-in-out infinite;
}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.15}40%{opacity:1}}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.ai-pill{
  padding:5px 14px;border-radius:10px;font-size:12px;
  border:0.5px solid rgba(0,229,160,0.3);
  color:var(--accent);background:rgba(0,229,160,0.06);
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all 0.15s;display:flex;align-items:center;gap:5px;
}
.ai-pill:active{transform:scale(0.95)}
.ai-pill.done{border-color:var(--border);color:var(--text3);background:transparent;cursor:default}
.card-actions{display:flex;gap:4px}
.act-btn{
  width:32px;height:32px;border-radius:10px;border:none;
  background:transparent;color:var(--text3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.act-btn:active{transform:scale(0.88)}
.act-btn.saved{color:var(--pink)}

/* Stats strip */
.stats{
  display:flex;gap:8px;padding:12px 16px 0;
}
.stat{
  flex:1;background:var(--bg3);border:0.5px solid var(--border);
  border-radius:14px;padding:10px 12px;text-align:center;
}
.stat-n{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:0.5px}

/* Bottom nav */
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;color:var(--text3);transition:color 0.15s;padding:4px 12px;
  font-size:10px;font-family:'Syne',sans-serif;letter-spacing:0.3px;
}
.nav-item.active{color:var(--accent)}
.nav-item svg{transition:transform 0.15s}
.nav-item:active svg{transform:scale(0.85)}

/* Empty */
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:0.4}
.empty p{font-size:14px;line-height:1.6}

/* Toast */
#toast{
  position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:0.5px solid var(--border2);
  color:var(--text);padding:10px 20px;border-radius:12px;
  font-size:13px;white-space:nowrap;opacity:0;
  transition:all 0.25s;pointer-events:none;z-index:100;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Shimmer skeleton */
.skeleton{
  background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
  border-radius:8px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;padding:16px;margin-bottom:12px}
</style>
</head>
<body>

<div id="root">
  <div id="header">
    <div class="h-top">
      <div class="brand">My<em>Feed</em></div>
      <div class="h-actions">
        <button class="icon-btn" id="refresh-btn" onclick="loadFeed()" title="更新">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2"/>
            <path d="M13.5 2.5v2.7h-2.7"/>
          </svg>
        </button>
        <button class="icon-btn" onclick="showToast('設定機能は近日公開予定です')" title="設定">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.2 3.2l1 1M11.8 11.8l1 1M12.8 3.2l-1 1M4.2 11.8l-1 1"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
      <input type="search" id="search" placeholder="キーワードで検索..." oninput="filterFeed()" autocomplete="off" autocorrect="off">
    </div>
    <div class="cats" id="cats"></div>
  </div>

  <div id="scroll-area">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">記事</div></div>
      <div class="stat"><div class="stat-n" id="s-saved">0</div><div class="stat-l">保存</div></div>
      <div class="stat"><div class="stat-n" id="s-ai">0</div><div class="stat-l">AI要約</div></div>
    </div>
    <div class="feed" id="feed"></div>
  </div>

  <nav id="nav">
    <div class="nav-item active" onclick="setNav('feed',this)">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="7" height="8" rx="2"/><rect x="11" y="3" width="7" height="4" rx="2"/><rect x="11" y="11" width="7" height="6" rx="2"/><rect x="2" y="14" width="7" height="3" rx="2"/></svg>
      フィード
    </div>
    <div class="nav-item" onclick="setNav('saved',this)">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 3h12a1 1 0 0 1 1 1v13l-7-3.5L3 17V4a1 1 0 0 1 1-1z"/></svg>
      保存済み
    </div>
    <div class="nav-item" onclick="setNav('trending',this)">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 14l4-4 3 3 4-5 5 4"/></svg>
      トレンド
    </div>
  </nav>
</div>

<div id="toast"></div>

<script>
const RSS_SOURCES = [
  {name:"TechCrunch Japan",url:"https://jp.techcrunch.com/feed/",cat:"テック",badge:"badge-tech"},
  {name:"The Verge",url:"https://www.theverge.com/rss/index.xml",cat:"テック",badge:"badge-tech"},
  {name:"Reuters Technology",url:"https://feeds.reuters.com/reuters/technologyNews",cat:"マーケット",badge:"badge-market"}
];
const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

let articles = [];
let activeCat = "すべて";
let activeNav = "feed";
const CATS = ["すべて","テック","マーケット"];

function renderCats(){
  document.getElementById("cats").innerHTML = CATS.map(c=>
    `<button class="cat${activeCat===c?" active":""}" onclick="setCat('${c}')">${c}</button>`
  ).join("");
}
function setCat(c){activeCat=c;renderCats();renderFeed()}

function setNav(n,el){
  activeNav=n;
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  renderFeed();
}

function filterFeed(){renderFeed()}

function renderFeed(){
  const q = document.getElementById("search").value.toLowerCase().trim();
  let items = articles.filter(a=>{
    if(activeNav==="saved" && !a.saved) return false;
    if(activeNav==="trending" && !a.trending) return false;
    if(activeCat!=="すべて" && a.cat!==activeCat) return false;
    if(q && !a.title.toLowerCase().includes(q) && !a.source.toLowerCase().includes(q)) return false;
    return true;
  });
  const feed = document.getElementById("feed");
  if(!items.length){
    feed.innerHTML=`<div class="empty"><div class="empty-icon">◎</div><p>${activeNav==="saved"?"保存した記事はまだありません":"条件に一致する記事がありません"}</p></div>`;
  } else {
    const label = activeNav==="saved"?"保存済み記事":activeNav==="trending"?"トレンド":"最新ニュース";
    feed.innerHTML=`<div class="section-label">${label} · ${items.length}件</div>`+items.map(cardHTML).join("");
  }
  updateStats();
}

function cardHTML(a){
  return `<div class="card" id="card-${a.id}">
    <div class="card-top">
      <span class="badge ${a.badge}">${a.cat}</span>
      <span class="card-time">${a.time}</span>
    </div>
    <div class="card-source">${a.source}</div>
    <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">${a.title}</a></div>
    ${a.summarized
      ? `<div class="summary" id="sum-${a.id}">${a.summary}</div>`
      : `<div id="sum-${a.id}"></div>`
    }
    <div class="card-footer">
      ${a.summarized
        ? `<div class="ai-pill done"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m2 6 3 3 5-5"/></svg>要約済み</div>`
        : `<button class="ai-pill" onclick="summarize(${a.id})"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v3M6 8v3M1 6h3M8 6h3"/></svg>AI要約</button>`
      }
      <div class="card-actions">
        <button class="act-btn${a.saved?" saved":""}" onclick="toggleSave(${a.id})" title="${a.saved?"保存解除":"保存"}">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="${a.saved?"currentColor":"none"}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 2h10a1 1 0 0 1 1 1v11l-6-3-6 3V3a1 1 0 0 1 1-1z"/></svg>
        </button>
        <button class="act-btn" onclick="share('${a.title.replace(/'/g,"\\'")}')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 1l4 4-4 4M1 9v1a4 4 0 0 0 4 4h10"/></svg>
        </button>
      </div>
    </div>
  </div>`;
}

async function summarize(id){
  const a = articles.find(x=>x.id===id);
  if(!a||a.summarized)return;
  const sumEl = document.getElementById(`sum-${id}`);
  sumEl.innerHTML = `<div class="summary-loading"><div class="dots"><span></span><span></span><span></span></div>AI要約を生成中...</div>`;
  const cardBtns = document.querySelectorAll(`#card-${id} .ai-pill`);
  cardBtns.forEach(b=>b.disabled=true);

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1000,
        system:"あなたはニュース要約AIです。記事タイトルから内容を想定し、日本語で2〜3文の簡潔な要約を生成してください。要約のみ返してください。",
        messages:[{role:"user",content:`「${a.title}」（出典：${a.source}）を要約してください。`}]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c=>c.type==="text")?.text||"要約を取得できませんでした。";
    a.summary=text; a.summarized=true;
    renderFeed();
    showToast("AI要約を生成しました");
  }catch(e){
    sumEl.innerHTML="";
    showToast("要約の取得に失敗しました");
    cardBtns.forEach(b=>b.disabled=false);
  }
}

function toggleSave(id){
  const a=articles.find(x=>x.id===id);
  if(!a)return;
  a.saved=!a.saved;
  showToast(a.saved?"記事を保存しました":"保存を解除しました");
  renderFeed();
}

function share(title){
  if(navigator.share){
    navigator.share({title:"MyFeed",text:title,url:location.href}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(title).then(()=>showToast("タイトルをコピーしました"));
  }
}

function updateStats(){
  document.getElementById("s-total").textContent=articles.length;
  document.getElementById("s-saved").textContent=articles.filter(x=>x.saved).length;
  document.getElementById("s-ai").textContent=articles.filter(x=>x.summarized).length;
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

async function loadFeed(){
  const btn=document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  const feed=document.getElementById("feed");
  feed.innerHTML=`<div class="feed" style="padding:0">
    ${[1,2,3,4].map(()=>`<div class="skel-card">
      <div class="skeleton" style="height:12px;width:60px;margin-bottom:12px"></div>
      <div class="skeleton" style="height:16px;width:90%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:14px;width:70%"></div>
    </div>`).join("")}
  </div>`;

  const saved = articles.filter(a=>a.saved).map(a=>a.url);
  const summarized = {};
  articles.filter(a=>a.summarized).forEach(a=>{ summarized[a.url]=a.summary; });

  const results = await Promise.allSettled(
    RSS_SOURCES.map(src =>
      fetch(RSS2JSON + encodeURIComponent(src.url))
        .then(r=>r.json())
        .then(data=>{
          if(!data.items) return [];
          return data.items.slice(0,8).map((item,i)=>({
            id: src.name+i,
            cat: src.cat,
            badge: src.badge,
            source: src.name,
            title: item.title||"",
            url: item.link||"#",
            time: timeAgo(item.pubDate),
            saved: saved.includes(item.link||""),
            summarized: !!(summarized[item.link||""]),
            summary: summarized[item.link||""]||"",
            trending: i < 2,
            pubDate: new Date(item.pubDate||0)
          }));
        })
    )
  );

  articles = results
    .filter(r=>r.status==="fulfilled")
    .flatMap(r=>r.value)
    .sort((a,b)=>b.pubDate-a.pubDate);

  if(!articles.length){
    articles = [{
      id:"fallback",cat:"テック",badge:"badge-tech",
      source:"MyFeed",time:"今",
      title:"RSSの取得に失敗しました。ネットワーク環境を確認してください。",
      url:"#",saved:false,summarized:false,summary:"",trending:false,pubDate:new Date()
    }];
  }

  btn.classList.remove("spinning");
  renderFeed();
  showToast(`${articles.length}件の記事を取得しました`);
}

function timeAgo(dateStr){
  if(!dateStr) return "";
  const diff = (Date.now() - new Date(dateStr)) / 60000;
  if(diff < 60) return `${Math.floor(diff)}分前`;
  if(diff < 1440) return `${Math.floor(diff/60)}時間前`;
  return `${Math.floor(diff/1440)}日前`;
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

renderCats();
renderFeed();
loadFeed();
</script>
</body>
</html>

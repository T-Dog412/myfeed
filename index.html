<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MyFeed">
<meta name="description" content="あなただけのAIニュースフィード">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MyFeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f5f7;--bg2:#fff;--bg3:#ebebed;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --text:#1a1a1e;--text2:#555560;--text3:#9090a0;
  --accent:#00a873;--accent2:#007a55;
  --blue:#1a6fd4;--amber:#d4820a;--purple:#6d4ed4;--pink:#c4356a;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}
#root{display:flex;flex-direction:column;height:100%;max-width:1100px;margin:0 auto}
#header{padding:calc(var(--safe-top) + 18px) 28px 12px;background:var(--bg);flex-shrink:0;z-index:10;border-bottom:0.5px solid var(--border)}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 72px)}
#scroll-area::-webkit-scrollbar{width:5px}
#scroll-area::-webkit-scrollbar-track{background:transparent}
#scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:1100px;padding:10px 28px calc(var(--safe-bottom) + 10px);background:var(--bg);display:flex;align-items:center;gap:4px;z-index:20;border-top:0.5px solid var(--border)}
@media(max-width:640px){
  #root{max-width:100%}
  #header{padding:calc(var(--safe-top) + 14px) 16px 10px}
  #nav{justify-content:space-around;padding:10px 16px calc(var(--safe-bottom) + 10px)}
  #scroll-area::-webkit-scrollbar{display:none}
}
.h-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.brand{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-0.5px;flex-shrink:0}
.brand em{color:var(--accent);font-style:normal}
.search-wrap{position:relative;flex:1;max-width:440px}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border:0.5px solid var(--border);border-radius:12px;background:var(--bg3);color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--border2)}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3)}
.h-actions{display:flex;gap:8px;margin-left:auto}
.icon-btn{width:36px;height:36px;border-radius:10px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:hover{background:var(--bg2)}
.icon-btn.spinning svg{animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cats{display:flex;gap:6px;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.cat.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
@media(max-width:640px){.search-wrap{max-width:none}.brand{font-size:20px}}

/* Hot topic */
#hot-wrap{padding:16px 28px 0}
@media(max-width:640px){#hot-wrap{padding:12px 16px 0}}
.hot-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:20px;overflow:hidden}
.hot-header{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:0.5px solid var(--border)}
.hot-badge{display:flex;align-items:center;gap:6px;background:#fff0e0;color:#c4600a;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif}
.hot-dot{width:6px;height:6px;border-radius:50%;background:#ff6b00;animation:blink 1.2s ease-in-out infinite}
.hot-label{font-size:13px;font-weight:500;color:var(--text2)}
.hot-refresh{margin-left:auto;padding:4px 12px;border-radius:8px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.hot-refresh:hover{background:var(--bg3)}
.hot-body{padding:14px 16px;font-size:14px;line-height:1.8;color:var(--text2)}
.hot-loading{display:flex;align-items:center;gap:10px;padding:14px 16px;font-size:13px;color:var(--text3)}

/* Stats */
.stats{display:flex;gap:8px;padding:14px 28px 0}
@media(max-width:640px){.stats{padding:12px 16px 0}}
.stat{flex:1;background:var(--bg3);border-radius:12px;padding:10px 12px;text-align:center}
.stat-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--text)}
.stat-l{font-size:10px;color:var(--text3);margin-top:2px}

/* Feed */
.feed-wrap{padding:14px 28px 0}
@media(max-width:640px){.feed-wrap{padding:12px 16px 0}}
.section-label{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.feed{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
@media(max-width:640px){.feed{display:flex;flex-direction:column;gap:10px}}

/* Card */
.card{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;overflow:hidden;transition:border-color 0.2s;display:flex;flex-direction:column}
.card:hover{border-color:var(--border2)}
.card-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--bg3)}
.card-img-placeholder{width:100%;height:120px;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--bg3)}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-top{display:flex;align-items:center;justify-content:space-between}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:500;font-family:'Syne',sans-serif}
.badge-ai{background:#d0f5e8;color:#007a55}
.badge-biz{background:#daeafc;color:#1a6fd4}
.badge-market{background:#fdefd4;color:#d4820a}
.badge-tech{background:#ede8fc;color:#6d4ed4}
.card-time{font-size:11px;color:var(--text3)}
.card-source{font-size:11px;color:var(--text3)}
.card-title{font-size:15px;font-weight:500;line-height:1.45;color:var(--text);flex:1}
.card-title a{color:inherit;text-decoration:none}
.card-title a:hover{color:var(--accent)}
.summary{font-size:13px;color:var(--text2);line-height:1.65;border-left:2px solid var(--accent2);padding-left:10px}
.summary-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text3)}
.dots{display:flex;gap:3px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent2);animation:blink 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.15}40%{opacity:1}}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:6px}
.ai-pill{padding:5px 12px;border-radius:10px;font-size:12px;border:0.5px solid rgba(0,168,115,0.3);color:var(--accent);background:rgba(0,168,115,0.06);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:4px}
.ai-pill:hover{background:rgba(0,168,115,0.12)}
.ai-pill.done{border-color:var(--border);color:var(--text3);background:transparent;cursor:default}
.card-actions{display:flex;gap:2px}
.act-btn{width:30px;height:30px;border-radius:8px;border:none;background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.act-btn:hover{background:var(--bg3)}
.act-btn.saved{color:var(--pink)}

.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);transition:color 0.15s;padding:4px 16px;font-size:10px;font-family:'Syne',sans-serif;letter-spacing:0.3px;border-radius:10px}
.nav-item.active{color:var(--accent)}
.nav-item:hover{background:var(--bg3)}
.empty{text-align:center;padding:4rem 2rem;color:var(--text3);font-size:14px}
.skel-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:18px;overflow:hidden}
.skeleton{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
#toast{position:fixed;bottom:calc(var(--safe-bottom) + 82px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg2);padding:9px 18px;border-radius:10px;font-size:13px;white-space:nowrap;opacity:0;transition:all 0.2s;pointer-events:none;z-index:100}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="root">
  <div id="header">
    <div class="h-top">
      <div class="brand">My<em>Feed</em></div>
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="5"/><path d="m11 11 3 3"/></svg>
        <input type="search" id="search" placeholder="キーワードで検索..." oninput="filterFeed()" autocomplete="off">
      </div>
      <div class="h-actions">
        <button class="icon-btn" id="refresh-btn" onclick="loadFeed()" title="更新">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2"/><path d="M13.5 2.5v2.7h-2.7"/></svg>
        </button>
      </div>
    </div>
    <div class="cats" id="cats"></div>
  </div>

  <div id="scroll-area">
    <div id="hot-wrap">
      <div class="hot-card">
        <div class="hot-header">
          <span class="hot-badge"><span class="hot-dot"></span>ホットトピック</span>
          <span class="hot-label">今日のAIトレンドレポート</span>
          <button class="hot-refresh" onclick="generateHotReport()">再生成</button>
        </div>
        <div class="hot-loading" id="hot-body">
          <div class="dots"><span></span><span></span><span></span></div>記事を取得後に生成します...
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">記事</div></div>
      <div class="stat"><div class="stat-n" id="s-saved">0</div><div class="stat-l">保存</div></div>
      <div class="stat"><div class="stat-n" id="s-ai">0</div><div class="stat-l">AI要約</div></div>
    </div>

    <div class="feed-wrap">
      <div class="section-label" id="feed-label"></div>
      <div class="feed" id="feed"></div>
    </div>
  </div>

  <nav id="nav">
    <div class="nav-item active" onclick="setNav('feed',this)">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="7" height="8" rx="2"/><rect x="11" y="3" width="7" height="4" rx="2"/><rect x="11" y="11" width="7" height="6" rx="2"/><rect x="2" y="14" width="7" height="3" rx="2"/></svg>
      フィード
    </div>
    <div class="nav-item" onclick="setNav('saved',this)">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 3h12a1 1 0 0 1 1 1v13l-7-3.5L3 17V4a1 1 0 0 1 1-1z"/></svg>
      保存済み
    </div>
    <div class="nav-item" onclick="setNav('trending',this)">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 14l4-4 3 3 4-5 5 4"/></svg>
      トレンド
    </div>
  </nav>
</div>
<div id="toast"></div>

<script>
const RSS_SOURCES = [
  {name:"TechCrunch Japan",url:"https://jp.techcrunch.com/feed/",cat:"テック",badge:"badge-tech",icon:"🖥"},
  {name:"The Verge",url:"https://www.theverge.com/rss/index.xml",cat:"テック",badge:"badge-tech",icon:"🖥"},
  {name:"Wired Japan",url:"https://wired.jp/rss/",cat:"テック",badge:"badge-tech",icon:"🖥"},
  {name:"東洋経済オンライン",url:"https://toyokeizai.net/list/feed/rss",cat:"マーケット",badge:"badge-market",icon:"📈"},
  {name:"MIT Technology Review",url:"https://www.technologyreview.com/feed/",cat:"AI",badge:"badge-ai",icon:"🤖"},
  {name:"Ars Technica",url:"https://feeds.arstechnica.com/arstechnica/index",cat:"テック",badge:"badge-tech",icon:"🖥"},
];
const RSS2JSON = "https://api.rss2json.com/v1/api.json?count=15&rss_url=";
const GEMINI_KEY = AIzaSyAiFUUcC6iqyNyveiyu2nSOfVh9ddvFU5M;
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;
const CATS = ["すべて","AI","テック","マーケット"];

let articles = [];
let activeCat = "すべて";
let activeNav = "feed";

function renderCats(){
  document.getElementById("cats").innerHTML = CATS.map(c=>
    `<button class="cat${activeCat===c?" active":""}" onclick="setCat('${c}')">${c}</button>`
  ).join("");
}
function setCat(c){activeCat=c;renderCats();filterFeed()}
function setNav(n,el){
  activeNav=n;
  document.querySelectorAll(".nav-item").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  filterFeed();
}
function filterFeed(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  let items=articles.filter(a=>{
    if(activeNav==="saved"&&!a.saved) return false;
    if(activeNav==="trending"&&!a.trending) return false;
    if(activeCat!=="すべて"&&a.cat!==activeCat) return false;
    if(q&&!a.title.toLowerCase().includes(q)&&!a.source.toLowerCase().includes(q)) return false;
    return true;
  });
  const label=activeNav==="saved"?"保存済み記事":activeNav==="trending"?"トレンド":"最新ニュース";
  document.getElementById("feed-label").textContent=articles.length?`${label} · ${items.length}件`:"";
  const feed=document.getElementById("feed");
  feed.innerHTML=items.length
    ? items.map(cardHTML).join("")
    : `<div class="empty">${activeNav==="saved"?"保存した記事はまだありません":"条件に一致する記事がありません"}</div>`;
  updateStats();
}

function cardHTML(a){
  const imgEl=a.image
    ? `<img class="card-img" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<div class="card-img-placeholder">${a.icon||"📰"}</div>`;
  const safeId=a.id.replace(/[^a-zA-Z0-9_-]/g,"_");
  return `<div class="card" id="card-${safeId}">
    ${imgEl}
    <div class="card-body">
      <div class="card-top">
        <span class="badge ${a.badge}">${a.cat}</span>
        <span class="card-time">${a.time}</span>
      </div>
      <div class="card-source">${a.source}</div>
      <div class="card-title"><a href="${a.url}" target="_blank" rel="noopener">${a.title}</a></div>
      ${a.summarized
        ? `<div class="summary" id="sum-${safeId}">${a.summary}</div>`
        : `<div id="sum-${safeId}"></div>`}
      <div class="card-footer">
        ${a.summarized
          ? `<div class="ai-pill done"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m2 6 3 3 5-5"/></svg>要約済み</div>`
          : `<button class="ai-pill" onclick="summarize('${safeId}')"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v3M6 8v3M1 6h3M8 6h3"/></svg>AI要約</button>`}
        <div class="card-actions">
          <button class="act-btn${a.saved?" saved":""}" onclick="toggleSave('${safeId}')">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="${a.saved?"currentColor":"none"}" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 2h10a1 1 0 0 1 1 1v11l-6-3-6 3V3a1 1 0 0 1 1-1z"/></svg>
          </button>
          <button class="act-btn" onclick="shareArticle('${a.title.replace(/'/g,"\\'")}','${a.url}')">
            <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11 1l4 4-4 4M1 9v1a4 4 0 0 0 4 4h10"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

async function gemini(prompt){
  const res=await fetch(GEMINI_URL,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
  });
  const data=await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text||"";
}

async function summarize(safeId){
  const a=articles.find(x=>x.id.replace(/[^a-zA-Z0-9_-]/g,"_")===safeId);
  if(!a||a.summarized) return;
  const sumEl=document.getElementById(`sum-${safeId}`);
  if(!sumEl) return;
  sumEl.innerHTML=`<div class="summary-loading"><div class="dots"><span></span><span></span><span></span></div>AI要約を生成中...</div>`;
  document.querySelectorAll(`#card-${safeId} .ai-pill`).forEach(b=>b.disabled=true);
  try{
    const text=await gemini(`以下のニュース記事を日本語で2〜3文に要約してください。要約のみ返してください。\n「${a.title}」（${a.source}）`);
    a.summary=text;a.summarized=true;
    filterFeed();
    showToast("AI要約を生成しました");
  }catch(e){
    sumEl.innerHTML="";
    showToast("要約の取得に失敗しました");
  }
}

async function generateHotReport(){
  const hotBody=document.getElementById("hot-body");
  hotBody.className="hot-loading";
  hotBody.innerHTML=`<div class="dots"><span></span><span></span><span></span></div>トレンドを分析中...`;
  if(!articles.length){
    hotBody.className="hot-body";
    hotBody.innerHTML="記事を取得してから再生成してください。";
    return;
  }
  const titles=articles.slice(0,30).map((a,i)=>`${i+1}. [${a.cat}] ${a.title}`).join("\n");
  try{
    const text=await gemini(`テクノロジー・ビジネスニュースのアナリストとして、以下の記事リストから今日の主要トレンドを3〜4点に絞り、日本語で簡潔にレポートしてください。各トレンドは「・」で始め1〜2文で。全体200文字以内。\n\n${titles}`);
    hotBody.className="hot-body";
    hotBody.innerHTML=text.split("\n").filter(l=>l.trim()).map(l=>
      `<p style="margin-bottom:5px">${l.replace(/^・/,'<span style="color:var(--accent);font-weight:600">・</span>')}</p>`
    ).join("");
  }catch(e){
    hotBody.className="hot-body";
    hotBody.innerHTML="レポートの生成に失敗しました。";
  }
}

function toggleSave(safeId){
  const a=articles.find(x=>x.id.replace(/[^a-zA-Z0-9_-]/g,"_")===safeId);
  if(!a) return;
  a.saved=!a.saved;
  showToast(a.saved?"保存しました":"保存を解除しました");
  filterFeed();
}

function shareArticle(title,url){
  if(navigator.share){navigator.share({title,url}).catch(()=>{})}
  else{navigator.clipboard?.writeText(url).then(()=>showToast("URLをコピーしました"))}
}

function updateStats(){
  document.getElementById("s-total").textContent=articles.length;
  document.getElementById("s-saved").textContent=articles.filter(x=>x.saved).length;
  document.getElementById("s-ai").textContent=articles.filter(x=>x.summarized).length;
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

function timeAgo(dateStr){
  if(!dateStr) return "";
  const diff=(Date.now()-new Date(dateStr))/60000;
  if(diff<60) return `${Math.floor(diff)}分前`;
  if(diff<1440) return `${Math.floor(diff/60)}時間前`;
  return `${Math.floor(diff/1440)}日前`;
}

function isEnglish(text){
  return /^[\x00-\x7F\s\-–—''""「」【】：:().,%&!?]+$/.test(text);
}

function extractImage(item){
  if(item.thumbnail&&item.thumbnail.startsWith("http")) return item.thumbnail;
  if(item.enclosure?.link?.match(/\.(jpg|jpeg|png|webp)/i)) return item.enclosure.link;
  const m=(item.content||item.description||"").match(/<img[^>]+src=["']([^"']+)["']/i);
  if(m&&m[1].startsWith("http")) return m[1];
  return null;
}

async function loadFeed(){
  const btn=document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  document.getElementById("feed").innerHTML=[1,2,3,4,5,6].map(()=>`
    <div class="skel-card">
      <div class="skeleton" style="height:140px"></div>
      <div style="padding:14px">
        <div class="skeleton" style="height:11px;width:50px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:15px;width:90%;margin-bottom:6px"></div>
        <div class="skeleton" style="height:14px;width:70%"></div>
      </div>
    </div>`).join("");

  const saved=articles.filter(a=>a.saved).map(a=>a.url);
  const prevSum={};
  articles.filter(a=>a.summarized).forEach(a=>{prevSum[a.url]=a.summary});

  const results=await Promise.allSettled(
    RSS_SOURCES.map(src=>
      fetch(RSS2JSON+encodeURIComponent(src.url))
        .then(r=>r.json())
        .then(data=>{
          if(!data.items) return [];
          return data.items.slice(0,15).map((item,i)=>({
            id:src.name.replace(/\s/g,"_")+i,
            cat:src.cat,badge:src.badge,source:src.name,icon:src.icon,
            title:item.title||"",url:item.link||"#",
            image:extractImage(item),
            time:timeAgo(item.pubDate),
            saved:saved.includes(item.link||""),
            summarized:!!(prevSum[item.link||""]),
            summary:prevSum[item.link||""]||"",
            trending:i<2,pubDate:new Date(item.pubDate||0)
          }));
        })
    )
  );

  articles=results.filter(r=>r.status==="fulfilled").flatMap(r=>r.value).sort((a,b)=>b.pubDate-a.pubDate);
  if(!articles.length){
    articles=[{id:"err",cat:"テック",badge:"badge-tech",icon:"📰",source:"MyFeed",time:"今",
      title:"RSSの取得に失敗しました。時間をおいて再試行してください。",
      url:"#",image:null,saved:false,summarized:false,summary:"",trending:false,pubDate:new Date()}];
  }

  btn.classList.remove("spinning");
  filterFeed();
  showToast(`${articles.length}件を取得、翻訳中...`);

  await translateEnglishTitles();
  filterFeed();
  showToast(`${articles.length}件の記事を取得しました`);
  generateHotReport();
}

async function translateEnglishTitles(){
  const targets=articles.filter(a=>isEnglish(a.title));
  if(!targets.length) return;
  const titlesText=targets.map((a,i)=>`${i+1}. ${a.title}`).join("\n");
  try{
    const text=await gemini(`以下のニュース記事タイトルを日本語に翻訳してください。番号付きリストをそのまま返してください。翻訳のみ、前置き不要。\n${titlesText}`);
    const lines=text.split("\n").filter(l=>l.trim());
    targets.forEach((a,i)=>{
      const m=lines[i]?.replace(/^\d+\.\s*/,"").trim();
      if(m) a.title=m;
    });
  }catch(e){}
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

renderCats();
filterFeed();
loadFeed();
</script>
